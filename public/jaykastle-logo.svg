<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="100%" height="100%">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007A3D"/>
      <stop offset="50%" stop-color="#005C29"/>
      <stop offset="100%" stop-color="#00401B"/>
    </linearGradient>
    <linearGradient id="crimsonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D62828"/>
      <stop offset="100%" stop-color="#B81D24"/>
    </linearGradient>
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Emblem Group (Spiked Nautical Helm / Compass Rose) -->
  <g transform="translate(10, 5) scale(0.95)" filter="url(#subtleGlow)">
    <!-- Outer Spikes (Nautical Helm / Turbine Blades) -->
    <!-- Top & Diagonal Spikes -->
    <path d="M 85 20 L 72 50 L 98 50 Z" fill="url(#emeraldGrad)" />
    <path d="M 135 35 L 110 60 L 128 78 Z" fill="url(#emeraldGrad)" />
    <path d="M 155 85 L 125 72 L 125 98 Z" fill="url(#emeraldGrad)" />
    <path d="M 140 140 L 115 118 L 98 135 Z" fill="url(#emeraldGrad)" />
    <path d="M 85 165 L 72 135 L 98 135 Z" fill="url(#emeraldGrad)" />
    <path d="M 30 145 L 58 122 L 42 102 Z" fill="url(#emeraldGrad)" />
    <path d="M 15 85 L 45 72 L 45 98 Z" fill="url(#emeraldGrad)" />
    <path d="M 35 30 L 60 55 L 42 72 Z" fill="url(#emeraldGrad)" />

    <!-- Main Outer Emerald Ring -->
    <circle cx="85" cy="85" r="54" fill="none" stroke="url(#emeraldGrad)" stroke-width="16" />

    <!-- Inner Crimson Red Ring -->
    <circle cx="85" cy="85" r="38" fill="#FFFFFF" stroke="url(#crimsonGrad)" stroke-width="8" />

    <!-- Central White Core & Emerald Center Dot -->
    <circle cx="85" cy="85" r="30" fill="#FFFFFF" />
    <circle cx="85" cy="85" r="13" fill="url(#emeraldGrad)" />
  </g>

  <!-- Brand Typography -->
  <!-- "Jaykastle" Wordmark -->
  <text x="175" y="96" 
        font-family="'Playfair Display', 'Cormorant Garamond', Georgia, serif" 
        font-weight="900" 
        font-style="italic"
        font-size="64" 
        fill="#006838" 
        letter-spacing="-1">
    Jaykastle
  </text>

  <!-- "NIGERIA LTD" Sub-brand -->
  <text x="260" y="138" 
        font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" 
        font-weight="800" 
        font-size="22" 
        fill="#B81D24" 
        letter-spacing="5.5">
    NIGERIA LTD
  </text>
</svg>
